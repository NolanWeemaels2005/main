<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nolan Portfolio</title>
    <script>
      const segments = window.location.pathname.split("/").filter(Boolean);
      const base = segments.length ? `/${segments[0]}/` : "/";
      const path = window.location.pathname;
      const route = path.startsWith(base) ? path.slice(base.length) : path.replace(/^\/+/, "");
      window.location.replace(`${base}${route ? `?/${route}` : ""}${window.location.search.replace(/^\?/, "&")}${window.location.hash}`);
    </script>
  </head>
  <body></body>
</html>
